<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Fundo preto com borda dourada -->
  <rect width="192" height="192" rx="36" fill="#0d0d0d"/>
  <rect x="6" y="6" width="180" height="180" rx="30" fill="none" stroke="#c9a55a" stroke-width="4"/>

  <!-- Tesoura simplificada estilizada -->
  <g fill="#c9a55a" stroke="#c9a55a" stroke-width="2">
    <!-- Lâmina superior -->
    <path d="M 50 60 L 110 100 L 130 90 L 70 50 Z" stroke-linejoin="round"/>
    <!-- Lâmina inferior -->
    <path d="M 50 132 L 110 92 L 130 102 L 70 142 Z" stroke-linejoin="round"/>
    <!-- Pivô -->
    <circle cx="120" cy="96" r="6" fill="#0d0d0d" stroke="#c9a55a" stroke-width="3"/>
    <!-- Argolas (handles) -->
    <circle cx="48" cy="60" r="11" fill="none" stroke="#c9a55a" stroke-width="6"/>
    <circle cx="48" cy="132" r="11" fill="none" stroke="#c9a55a" stroke-width="6"/>
  </g>
</svg>
